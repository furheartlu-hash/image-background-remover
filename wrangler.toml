name = "bg-remover"
main = "worker.js"
compatibility_date = "2024-01-01"

[vars]
# 所有敏感 Key 均通过 wrangler secret 配置，不写在此文件中

[[d1_databases]]
binding = "DB"
database_name = "image-background-remover"
database_id = "8e0f467a-4a6b-4f67-b5ef-b4b108df1d03"

# Secrets（在 Cloudflare Dashboard 或 wrangler secret put 配置）:
#   REMOVE_BG_API_KEY     - remove.bg API Key
#   GOOGLE_CLIENT_ID      - Google OAuth Client ID
#   GOOGLE_CLIENT_SECRET  - Google OAuth Client Secret
#   PAYPAL_CLIENT_ID      - PayPal App Client ID
#   PAYPAL_CLIENT_SECRET  - PayPal App Client Secret
